<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host MCP Session Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    header {
      background: #111827;
      color: white;
      padding: 12px 16px;
      font-weight: 600;
    }

    .layout {
      display: flex;
      height: calc(100vh - 48px);
    }

    .sidebar {
      width: 300px;
      background: white;
      border-right: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
    }

    .sidebar h3 {
      margin: 0;
      padding: 12px;
      font-size: 14px;
      border-bottom: 1px solid #e5e7eb;
    }

    .session-list {
      flex: 1;
      overflow-y: auto;
    }

    .session-item {
      padding: 10px 12px;
      border-bottom: 1px solid #f1f5f9;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .session-item:hover {
      background: #f3f4f6;
    }

    .session-item.active {
      background: #dbeafe;
      font-weight: 600;
    }

    .session-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .delete-btn, .rename-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 12px;
      padding: 2px 4px;
    }

    .delete-btn { color: #ef4444; }
    .rename-btn { color: #6b7280; }

    .delete-btn:hover { text-decoration: underline; }
    .rename-btn:hover { color: #111827; }

    .session-name {
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-sub {
      font-size: 11px;
      color: #9ca3af;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rename-input {
      font-size: 13px;
      padding: 2px 6px;
      border: 1px solid #93c5fd;
      border-radius: 4px;
      width: 100%;
      box-sizing: border-box;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      gap: 12px;
      padding: 10px;
      background: white;
      border-bottom: 1px solid #e5e7eb;
      align-items: center;
    }

    input {
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
    }

    button {
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      background: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #f3f4f6;
    }

    .chat {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #f9fafb;
    }

    .msg {
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
      white-space: pre-wrap;
    }

    .user {
      background: #dbeafe;
      margin-left: auto;
    }

    .assistant {
      background: #e5e7eb;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 12px;
      background: white;
      border-top: 1px solid #e5e7eb;
    }

    .context-box {
      margin-left: auto;
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 12px;
      color: #374151;
    }
  </style>
</head>
<body>

<header>Host MCP Session Dashboard</header>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>Sessions</h3>

    <div style="padding:10px; display:flex; flex-direction:column; gap:6px;">
      <input id="newDisplayName" placeholder="名稱（選填）" />
      <input id="newContext" placeholder="context" />
      <button onclick="createSession()">New</button>
    </div>

    <button onclick="loadSessions()">Refresh</button>

    <div id="sessionList" class="session-list"></div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="context-box">
        <span>切換AI助手:</span>
        <select id="contextId" style="width:150px; padding: 6px; border: 1px solid #d1d5db; border-radius: 6px; outline: none;">
          <option value="general">general</option>
          <option value="code_dev">code_dev</option>
          <option value="esg">esg</option>
          <option value="creative_writer">creative_writer</option>
          <option value="medical_assistant">medical_assistant</option>
        </select>
        <button onclick="switchContext()">Apply</button>
      </div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
      <input id="message" placeholder="type message..." />
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>
</div>

<script>
const baseUrl = "http://127.0.0.1:8010";
let sessionId = null;

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  document.getElementById('chat').appendChild(div);
  div.scrollIntoView();
}

async function createSession() {
  const context_id = document.getElementById('newContext').value || 'general';
  const display_name = document.getElementById('newDisplayName').value.trim();

  const res = await fetch(baseUrl + '/session/start', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({context_id, display_name})
  });

  const data = await res.json();
  sessionId = data.data.session_id;

  document.getElementById('contextId').value = context_id;
  document.getElementById('newDisplayName').value = '';

  addMsg('assistant', `Created session: ${display_name || sessionId} (context: ${context_id})`);
  loadSessions();
}

async function loadSessions() {
  const res = await fetch(baseUrl + '/sessions');
  const data = await res.json();

  const list = document.getElementById('sessionList');
  list.innerHTML = '';

  (data.data || []).forEach(s => {
    const div = document.createElement('div');
    div.className = 'session-item' + (s.session_id === sessionId ? ' active' : '');

    const left = document.createElement('div');
    left.style.overflow = 'hidden';
    left.style.flex = '1';

    const nameEl = document.createElement('div');
    nameEl.className = 'session-name';
    nameEl.textContent = s.display_name || s.session_id.slice(0, 8) + '...';

    const subEl = document.createElement('div');
    subEl.className = 'session-sub';
    subEl.textContent = `ctx: ${s.context_id}`;

    left.appendChild(nameEl);
    left.appendChild(subEl);

    left.onclick = () => {
      sessionId = s.session_id;
      document.getElementById('contextId').value = s.context_id;
      loadChatPreview(s);
      loadSessions();
    };

    const actions = document.createElement('div');
    actions.className = 'session-actions';

    const ren = document.createElement('button');
    ren.className = 'rename-btn';
    ren.textContent = '✎';
    ren.title = '重新命名';

    ren.onclick = async (e) => {
      e.stopPropagation();
      const current = s.display_name || '';
      const input = document.createElement('input');
      input.className = 'rename-input';
      input.value = current;
      left.replaceChild(input, nameEl);
      input.focus();
      input.select();

      const commit = async () => {
        const newName = input.value.trim();
        if (newName === current) { left.replaceChild(nameEl, input); return; }
        await fetch(baseUrl + '/session/rename', {
          method: 'PATCH',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({session_id: s.session_id, display_name: newName})
        });
        loadSessions();
      };

      input.onblur = commit;
      input.onkeydown = (ev) => {
        if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
        if (ev.key === 'Escape') { left.replaceChild(nameEl, input); }
      };
    };

    const del = document.createElement('button');
    del.className = 'delete-btn';
    del.textContent = '✕';
    del.title = '刪除';

    del.onclick = async (e) => {
      e.stopPropagation();
      if (!confirm('確定要刪除這個 session 嗎？')) return;
      await fetch(baseUrl + '/session/' + s.session_id, { method: 'DELETE' });
      if (sessionId === s.session_id) {
        sessionId = null;
        document.getElementById('chat').innerHTML = '';
      }
      loadSessions();
    };

    actions.appendChild(ren);
    actions.appendChild(del);
    div.appendChild(left);
    div.appendChild(actions);
    list.appendChild(div);
  });
}

function loadChatPreview(session) {
  document.getElementById('chat').innerHTML = '';
  (session.messages || []).forEach(m => {
    addMsg(m.role === 'user' ? 'user' : 'assistant', m.content);
  });
}

async function switchContext() {
  if (!sessionId) return;

  const context_id = document.getElementById('contextId').value;

  const res = await fetch(baseUrl + '/session/context', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({session_id: sessionId, context_id})
  });

  await res.json();
  addMsg('assistant', 'context switched: ' + context_id);
  loadSessions();
}

async function sendMessage() {
  const msg = document.getElementById('message').value;
  if (!msg || !sessionId) return;

  addMsg('user', msg);
  document.getElementById('message').value = '';

  const res = await fetch(baseUrl + '/chat', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({session_id: sessionId, message: msg})
  });

  const data = await res.json();
  const resp = data.data.assistant_response;

  let text = resp.answer;

  if (resp.sources && resp.sources.length > 0) {
    text += "\n\n--- sources ---\n";
    resp.sources.forEach(s => {
      text += `#${s.source_id} (${s.tool_name})\n`;
    });
  }

  addMsg('assistant', text);
}

window.onload = loadSessions;
</script>

</body>
</html>
