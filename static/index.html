<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host MCP Session Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    header {
      background: #111827;
      color: white;
      padding: 12px 16px;
      font-weight: 600;
    }

    .layout {
      display: flex;
      height: calc(100vh - 48px);
    }

    .sidebar {
      width: 300px;
      background: white;
      border-right: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
    }

    .sidebar h3 {
      margin: 0;
      padding: 12px;
      font-size: 14px;
      border-bottom: 1px solid #e5e7eb;
    }

    .session-list {
      flex: 1;
      overflow-y: auto;
    }

    .session-item {
      padding: 10px 12px;
      border-bottom: 1px solid #f1f5f9;
      cursor: pointer;
      font-size: 13px;
    }

    .session-item:hover {
      background: #f3f4f6;
    }

    .session-item.active {
      background: #dbeafe;
      font-weight: 600;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      gap: 8px;
      padding: 10px;
      background: white;
      border-bottom: 1px solid #e5e7eb;
      align-items: center;
    }

    input {
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
    }

    button {
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      background: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #f3f4f6;
    }

    .chat {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #f9fafb;
    }

    .msg {
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
      white-space: pre-wrap;
    }

    .user {
      background: #dbeafe;
      margin-left: auto;
    }

    .assistant {
      background: #e5e7eb;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 12px;
      background: white;
      border-top: 1px solid #e5e7eb;
    }

    .context-box {
      font-size: 12px;
      color: #374151;
      margin-left: auto;
      display: flex;
      gap: 6px;
      align-items: center;
    }
  </style>
</head>
<body>

<header>Host MCP Session Dashboard</header>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>Sessions</h3>

    <div style="padding:10px; display:flex; gap:6px;">
      <input id="newContext" placeholder="context id" />
      <button onclick="createSession()">New</button>
    </div>

    <button onclick="loadSessions()">Refresh</button>

    <div id="sessionList" class="session-list"></div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <div style="font-size:12px; color:#6b7280;">
        base_url: http://127.0.0.1:8010
      </div>

      <div class="context-box">
        <span>Context:</span>
        <input id="contextId" style="width:140px" />
        <button onclick="switchContext()">Apply</button>
      </div>
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
      <input id="message" placeholder="type message..." />
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>
</div>

<script>
const baseUrl = "http://127.0.0.1:8010";
let sessionId = null;

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  document.getElementById('chat').appendChild(div);
  div.scrollIntoView();
}

async function createSession() {
  const context_id = document.getElementById('newContext').value || 'general';

  const res = await fetch(baseUrl + '/session/start', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({context_id})
  });

  const data = await res.json();
  sessionId = data.data.session_id;

  addMsg('assistant', `Created session: ${sessionId} (context: ${context_id})`);

  document.getElementById('contextId').value = context_id;
  loadSessions();
}

async function loadSessions() {
  const res = await fetch(baseUrl + '/sessions');
  const data = await res.json();

  const list = document.getElementById('sessionList');
  list.innerHTML = '';

  (data.data || []).forEach(s => {
    const div = document.createElement('div');
    div.className = 'session-item' + (s.session_id === sessionId ? ' active' : '');

    div.textContent = `${s.session_id}\ncontext: ${s.context_id}`;

    div.onclick = () => {
      sessionId = s.session_id;
      document.getElementById('contextId').value = s.context_id;
      loadChatPreview(s);
      loadSessions();
    };

    list.appendChild(div);
  });
}

function loadChatPreview(session) {
  document.getElementById('chat').innerHTML = '';
  (session.messages || []).forEach(m => {
    addMsg(m.role === 'user' ? 'user' : 'assistant', m.content);
  });
}

async function switchContext() {
  if (!sessionId) return;

  const context_id = document.getElementById('contextId').value;

  const res = await fetch(baseUrl + '/session/context', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({session_id: sessionId, context_id})
  });

  await res.json();
  addMsg('assistant', 'context switched: ' + context_id);
  loadSessions();
}

async function sendMessage() {
  const msg = document.getElementById('message').value;
  if (!msg || !sessionId) return;

  addMsg('user', msg);
  document.getElementById('message').value = '';

  const res = await fetch(baseUrl + '/chat', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({session_id: sessionId, message: msg})
  });

  const data = await res.json();
  addMsg('assistant', data.data.assistant_response.answer);
}

window.onload = loadSessions;
</script>

</body>
</html>
