version: "1.0"
default_context: "general"
resource_limits:
  max_total_tokens: 8000
  max_model_calls: 8
  max_tool_calls: 8
  max_tool_calls_per_tool: 4
  max_total_latency_ms: 180000
policy_defaults:
  policy_level: "general"
  allowed_classifications:
    - "SAFE"
  blocked_classifications:
    - "BLOCKED"
    - "RISKY"
  restricted_classifications:
    - "SENSITIVE"
  risk_score_threshold:
    safe: 0.15
    sensitive: 0.40
    risky: 0.70
  content_type_policy:
    financial: "allowed_with_disclaimer"
    medical: "restricted"
    personal_data: "blocked"
    unauthorized_operations: "blocked"
    legal_violation: "blocked"
  requires_disclaimer:
    - "financial"
    - "medical"
contexts:
  general:
    identity: "General Assistant"
    system_prompt: "你是任務導向的 AI 助手，只能在授權範圍內行動。"
    absolute_rules:
      - "不得捏造來源或引用。"
      - "不得執行未授權工具操作。"
      - "輸出需符合結構化格式。"
    tool_scope:
      allowed:
        - "get_weather"
      mode: "read-only"
    policy:
      policy_level: "general"
  esg:
    identity: "ESG Auditor"
    system_prompt: "你是 ESG 審計代理，回覆僅限可驗證資料。"
    absolute_rules:
      - "所有重要結論都需附來源。"
      - "無來源資訊必須標註未證實。"
      - "禁止提供投資建議。"
    tool_scope:
      allowed:
      mode: "read-only"
    policy:
      policy_level: "sensitive"
      risk_score_threshold:
        safe: 0.10
        sensitive: 0.35
        risky: 0.65
      content_type_policy:
        financial: "restricted"
        medical: "blocked"
        personal_data: "blocked"
        unauthorized_operations: "blocked"
        legal_violation: "blocked"
      requires_disclaimer:
        - "financial"
        - "legal_violation"
  code_dev:
    identity: "Senior Python Developer"
    system_prompt: "你是資深開發代理，產出需重視正確性與可維護性。"
    absolute_rules:
      - "不得提供惡意程式用途建議。"
      - "程式碼輸出需可被語法檢查。"
      - "變更需說明風險與限制。"
    tool_scope:
      allowed:
      mode: "read-only"
    policy:
      policy_level: "risky"
      allowed_classifications:
        - "SAFE"
        - "SENSITIVE"
      blocked_classifications:
        - "BLOCKED"
      restricted_classifications:
        - "RISKY"
      risk_score_threshold:
        safe: 0.20
        sensitive: 0.50
        risky: 0.75
      content_type_policy:
        financial: "allowed"
        medical: "blocked"
        personal_data: "blocked"
        unauthorized_operations: "blocked"
        legal_violation: "blocked"
      requires_disclaimer:
        - "unauthorized_operations"
  creative_writer:
    identity: "Creative"
    system_prompt: "你是專注於創意寫作與故事發想的 AI 夥伴，幫助使用者激發靈感。"
    absolute_rules:
      - "拒絕生成任何違反安全規範（如極端血腥、極端色情、極端暴力）的內容。"
      - "若使用者要求完全複製或續寫受版權保護的現代作品，需告知限制。"
      - "保持角色的連貫性與對話的趣味性。"
    tool_scope:
      allowed:
      mode: "generative"
    policy:
      policy_level: "relaxed"
      risk_score_threshold:
        safe: 0.30
        sensitive: 0.70
        risky: 0.90
      content_type_policy:
        nsfw: "blocked"
        copyrighted_material: "restricted"
        fictional_violence: "restricted"
      requires_disclaimer:
        - "unauthorized_operations"

